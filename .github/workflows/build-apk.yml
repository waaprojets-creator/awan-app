name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Prebuild native Android project (Expo bare)
        run: npx expo prebuild --platform android --non-interactive

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        if: ${{ inputs.build_type == 'debug' }}
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        if: ${{ inputs.build_type == 'release' }}
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Sign release APK with debug keystore (installable)
        if: ${{ inputs.build_type == 'release' }}
        run: |
          set -e
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -keystore android/app/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          BT=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          SRC=$(ls android/app/build/outputs/apk/release/*.apk | head -1)
          echo "build-tools=$BT  source=$SRC"
          "$ANDROID_HOME/build-tools/$BT/apksigner" sign \
            --ks android/app/debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            --out android/app/build/outputs/apk/release/awan-release.apk "$SRC"
          "$ANDROID_HOME/build-tools/$BT/apksigner" verify --verbose android/app/build/outputs/apk/release/awan-release.apk

      - name: Upload debug APK
        if: ${{ inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: awan-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload release APK
        if: ${{ inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: awan-release
          path: android/app/build/outputs/apk/release/awan-release.apk
          retention-days: 14
