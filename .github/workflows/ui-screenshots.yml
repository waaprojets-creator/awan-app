name: UI Screenshots

on:
  push:
    branches:
      - claude/account-access-questions-dV31p
      - main
  workflow_dispatch:

jobs:
  screenshot:
    name: Playwright — captures 14 écrans
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Run smoke tests (screenshots)
        run: npx playwright test tests/e2e/01-smoke-navigation.spec.ts --config=playwright.ci.config.ts
        continue-on-error: true

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.sha }}
          path: |
            tests/e2e/screenshots/
            test-results/
          retention-days: 30

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: tests/e2e/report/
          retention-days: 14
